name: Dynamic Security Scan

on:
  push:
    branches: ["main"]

  workflow_dispatch:

jobs:
  dynamic_security_scan:
    name: ZAP + SQLMap + AI Remediation
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install demo app dependencies
        working-directory: demo-app
        run: pip install -r requirements.txt

      - name: Start demo app
        working-directory: demo-app
        run: |
          nohup python app.py > app.log 2>&1 &

      - name: Wait for demo app
        run: |
          for i in {1..15}; do
            if curl -s "http://localhost:5000/product?id=1" > /dev/null; then
              echo "Demo app is running"
              exit 0
            fi
            echo "Waiting for demo app..."
            sleep 2
          done

          echo "Demo app failed to start"
          exit 1

      - name: Run ZAP Full Scan
        run: |
          mkdir -p zap-reports
          chmod 777 zap-reports

          docker run --rm \
            --network host \
            -v ${{ github.workspace }}/zap-reports:/zap/wrk/:rw \
            -t ghcr.io/zaproxy/zaproxy:stable \
            zap-full-scan.py \
            -t http://localhost:5000 \
            -I \
            -r zap-report.html \
            -J zap-report.json \
            -w zap-report.md || true

      - name: Run SQLMap Scan
        run: |
          mkdir -p sqlmap-reports

          docker run --rm \
            --network host \
            -v ${{ github.workspace }}/sqlmap-reports:/root/.local/share/sqlmap/output \
            parrotsec/sqlmap \
            -u "http://localhost:5000/product?id=1" \
            --batch \
            --answers="follow=Y,reduce=Y" \
            --output-dir=/root/.local/share/sqlmap/output \
            | tee sqlmap-reports/sqlmap-output.txt || true

      - name: Install AI agent dependency
        run: python -m pip install -U google-genai

      - name: Aggregate dynamic scan findings
        run: python aggregator.py zap-reports/zap-report.json sqlmap-reports/sqlmap-output.txt

      - name: Generate AI report
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-3.1-flash-lite
        run: python scripts/remediation_agent.py

      - name: Add remediation report to job summary
        run: |
          echo "# AI Remediation Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat remediation-report.md >> $GITHUB_STEP_SUMMARY

      - name: Upload sequrity reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dynamic-security-reports
          path: |
            zap-reports/
            sqlmap-reports/
            aggregated-findings.json
            remediation-report.md
