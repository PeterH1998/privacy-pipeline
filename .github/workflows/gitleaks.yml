name: Gitleaks

on:
  [push]

jobs:
  scan:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: gitleaks/gitleaks-action@v2
        with:
          config-path: config/gitleaks.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}