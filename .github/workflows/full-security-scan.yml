name: Security & Privacy Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  secret_scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          report-format: sarif
          report-path: gitleaks-report.sarif
      - uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.sarif

  pii_scan:
    name: Privacy Scan (PII)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run PII Scanner
        continue-on-error: true
        run: python piiscanner/piiscanner.py --exclude tests/ > pii-report.sarif || true
      - uses: actions/upload-artifact@v4
        with:
          name: pii-report
          path: pii-report.sarif

  sast_scan:
    name: Static Scan (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            build-mode: none
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"
          output: codeql-results
      - uses: actions/upload-artifact@v4
        with:
          name: codeql-report
          path: codeql-results/

  dependency_scan:
    name: Dependency Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy FS Scan
        uses: aquasecurity/trivy-action@0.35.0
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          skip-dirs: tests/
          scanners: vuln
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-report.sarif
      - uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.sarif

  dynamic_scan:
    name: Dynamic Scan (ZAP + SQLMap)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install & Start Demo App
        working-directory: demo-app
        run: |
          pip install -r requirements.txt
          nohup python app.py > app.log 2>&1 &
      - name: Wait for demo app
        run: |
          for i in {1..15}; do
            if curl -s "http://localhost:5000/product?id=1" > /dev/null; then exit 0; fi
            sleep 2
          done
          exit 1
      - name: Run ZAP Full Scan
        run: |
          mkdir -p zap-reports
          chmod 777 zap-reports
          docker run --rm --network host -v ${{ github.workspace }}/zap-reports:/zap/wrk/:rw -t ghcr.io/zaproxy/zaproxy:stable zap-full-scan.py -t http://localhost:5000 -I -J zap-report.json || true
      - name: Run SQLMap Scan
        run: |
          mkdir -p sqlmap-reports
          docker run --rm --network host -v ${{ github.workspace }}/sqlmap-reports:/root/.local/share/sqlmap/output parrotsec/sqlmap -u "http://localhost:5000/product?id=1" --batch --answers="follow=Y,reduce=Y" --output-dir=/root/.local/share/sqlmap/output | tee sqlmap-reports/sqlmap-output.txt || true
      - uses: actions/upload-artifact@v4
        with:
          name: dynamic-reports
          path: |
            zap-reports/
            sqlmap-reports/

  ai_reporting:
    name: Aggregate & AI Report
    runs-on: ubuntu-latest
    needs: [secret_scan, pii_scan, sast_scan, dependency_scan, dynamic_scan]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: all-reports

      - name: Install Dependencies
        run: python -m pip install -U google-genai

      - name: Aggregate all scan findings
        run: python aggregator.py all-reports/

      - name: Generate AI report
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-3.1-flash-lite
        run: python scripts/agent.py

      - name: Add report to job summary
        run: |
          echo "# Unified Security Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat agent-report.md >> $GITHUB_STEP_SUMMARY

      - name: Upload Final Report
        uses: actions/upload-artifact@v4
        with:
          name: final-ai-report
          path: agent-report.md
